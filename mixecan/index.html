<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <meta name="theme-color" content="#050b13">
  <title>Mixecan | Private Investment Opportunity</title>
  <style>
    :root{--navy:#050b13;--ivory:#f4efe5;--gold:#bd8524;--muted:rgba(244,239,229,.64)}
    *{box-sizing:border-box}
    html,body{margin:0;min-height:100%;background:var(--navy);color:var(--ivory)}
    body{display:grid;place-items:center;min-height:100svh;padding:32px;font-family:Arial,Helvetica,sans-serif;-webkit-font-smoothing:antialiased;text-align:center}
    main{width:min(760px,100%)}
    .eyebrow{margin:0 0 28px;color:var(--gold);font-size:11px;letter-spacing:.28em;text-transform:uppercase}
    h1{margin:0;font-family:Georgia,"Times New Roman",serif;font-size:clamp(54px,10vw,104px);font-weight:400;letter-spacing:.12em}
    .rule{width:58px;height:1px;margin:30px auto;background:var(--gold)}
    p{margin:0;color:var(--muted);font-size:16px;line-height:1.7}
    a{display:inline-block;margin-top:32px;color:var(--ivory);font-size:10px;letter-spacing:.2em;text-decoration:none;text-transform:uppercase;border-bottom:1px solid rgba(244,239,229,.28);padding-bottom:7px}
  </style>
</head>
<body>
  <main>
    <p class="eyebrow">Private Investment Opportunity</p>
    <h1>MIXECAN</h1>
    <div class="rule" aria-hidden="true"></div>
    <p>The private investment presentation is currently being prepared.</p>
    <a href="/">Return to J49 Ventures</a>
  </main>
</body>
</html>
