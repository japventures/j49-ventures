<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>J49 Ventures | Family Office</title>
  <meta name="description" content="J49 Ventures is a privately held family office focused on long-term value creation.">
  <meta name="theme-color" content="#f7f3ec">
  <link rel="icon" href="assets/images/j49-logo-cropped.png" type="image/png">
  <style>
    :root {
      --background: #f7f3ec;
      --text: #2e2e2e;
      --muted: #8a857f;
      --line: #cfc7bc;
    }

    * { box-sizing: border-box; }

    html, body { min-height: 100%; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr auto;
      background: var(--background);
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    header {
      padding: 30px clamp(24px, 5vw, 72px) 0;
    }

    .logo {
      display: block;
      width: clamp(145px, 14vw, 205px);
      height: auto;
    }

    main {
      display: flex;
      align-items: center;
      padding: 8vh clamp(24px, 10vw, 150px);
    }

    .hero {
      max-width: 790px;
    }

    h1 {
      margin: 0;
      max-width: 760px;
      font-size: clamp(42px, 6vw, 86px);
      line-height: .98;
      letter-spacing: -0.04em;
      font-weight: 400;
    }

    .intro {
      margin: 34px 0 0;
      max-width: 635px;
      font-size: clamp(17px, 1.55vw, 22px);
      line-height: 1.65;
      color: #5f5b56;
    }

    .contact {
      display: inline-block;
      margin-top: 38px;
      padding-bottom: 5px;
      color: var(--text);
      font-size: 14px;
      letter-spacing: .14em;
      text-decoration: none;
      text-transform: uppercase;
      border-bottom: 1px solid var(--line);
    }

    footer {
      display: flex;
      justify-content: space-between;
      gap: 24px;
      padding: 0 clamp(24px, 5vw, 72px) 28px;
      color: var(--muted);
      font-size: 12px;
      letter-spacing: .08em;
      text-transform: uppercase;
    }

    @media (max-width: 640px) {
      header { padding-top: 22px; }
      main { align-items: flex-start; padding-top: 18vh; }
      .intro { margin-top: 26px; }
      footer { flex-direction: column; gap: 8px; }
    }
  </style>
</head>
<body>
  <header>
    <img class="logo" src="assets/images/j49-logo-cropped.png" alt="J49 Ventures Family Office">
  </header>

  <main>
    <section class="hero">
      <h1>Building Long-Term Value.</h1>
      <p class="intro">J49 Ventures is a privately held family office focused on selective investments, strategic partnerships, and long-term ownership.</p>
      <a class="contact" href="mailto:contact@j49.mx">contact@j49.mx</a>
    </section>
  </main>

  <footer>
    <span>© 2026 J49 Ventures</span>
    <span>The Woodlands, Texas</span>
  </footer>
</body>
</html>
