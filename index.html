<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>J49 Ventures | Family Office</title>
<meta name="description" content="J49 Ventures is a privately held family office focused on long-term ownership, strategic investments, and disciplined capital allocation.">
<meta name="theme-color" content="#f4efe7">
<link rel="icon" href="assets/j49-logo-transparent.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#f4efe7;--ink:#272522;--muted:#777168;--line:rgba(39,37,34,.16);--page:clamp(24px,5.4vw,84px)}
*{box-sizing:border-box}
html{scroll-behavior:smooth}
body{margin:0;min-height:100vh;background:radial-gradient(circle at 78% 18%,rgba(255,255,255,.45),transparent 28%),linear-gradient(180deg,rgba(255,255,255,.12),rgba(255,255,255,0)),var(--bg);color:var(--ink);font-family:"Manrope",Arial,sans-serif;-webkit-font-smoothing:antialiased}
.page{min-height:100svh;display:grid;grid-template-rows:auto 1fr auto;padding:26px var(--page) 24px;position:relative;overflow:hidden}
.page:before,.page:after{content:"";position:absolute;width:min(52vw,760px);aspect-ratio:1;border:1px solid rgba(39,37,34,.045);transform:rotate(45deg);pointer-events:none;z-index:0}
.page:before{right:-22vw;top:8%}
.page:after{right:-10vw;bottom:-40vw;width:min(34vw,500px);opacity:.6}
header,main,footer{position:relative;z-index:1}
.brand{width:clamp(120px,9vw,155px);display:inline-block}
.brand img{width:100%;display:block}
main{display:flex;align-items:center;justify-content:center;padding:clamp(72px,10vh,140px) 0}
.hero{width:min(980px,100%);display:grid;grid-template-columns:minmax(0,.9fr) minmax(0,1.1fr);gap:clamp(48px,8vw,120px);align-items:end}
.eyebrow{margin:0 0 26px;color:var(--muted);font-size:11px;letter-spacing:.27em;text-transform:uppercase}
h1{margin:0;max-width:8ch;font-size:clamp(56px,7vw,108px);line-height:.92;letter-spacing:-.065em;font-weight:500}
.copy{padding-bottom:8px}
.copy:before{content:"";display:block;width:68px;height:1px;background:var(--line);margin-bottom:28px}
.intro{margin:0;max-width:540px;color:#5e5952;font-size:clamp(17px,1.45vw,21px);line-height:1.65}
.contact{display:inline-block;margin-top:34px;color:var(--ink);text-decoration:none;text-transform:uppercase;font-size:11px;letter-spacing:.2em;padding-bottom:7px;border-bottom:1px solid var(--line);transition:opacity .2s ease,border-color .2s ease}
.contact:hover{opacity:.62;border-color:var(--ink)}
footer{display:flex;justify-content:space-between;gap:24px;color:#8b847b;font-size:9px;letter-spacing:.15em;text-transform:uppercase}
@media(max-width:820px){.page{padding-top:20px}.brand{width:112px}main{padding:64px 0 54px}.hero{grid-template-columns:1fr;gap:38px;align-items:start}h1{font-size:clamp(54px,16vw,82px)}.copy{max-width:620px}.page:before{width:110vw;right:-68vw;top:24%}footer{align-items:flex-end;font-size:8px}footer span:last-child{text-align:right}}
</style>
</head>
<body>
<div class="page">
<header><a class="brand" href="/" aria-label="J49 Ventures home"><img src="assets/j49-logo-transparent.png" alt="J49 Ventures Family Office"></a></header>
<main>
<section class="hero" aria-labelledby="hero-title">
<div><p class="eyebrow">Private Investment Office</p><h1 id="hero-title">Building long-term value.</h1></div>
<div class="copy"><p class="intro">J49 Ventures is a privately held family office focused on long-term ownership, strategic investments, and disciplined capital allocation.</p><a class="contact" href="mailto:contact@j49.mx">contact@j49.mx</a></div>
</section>
</main>
<footer><span>© 2026 J49 Ventures</span><span>The Woodlands, Texas</span></footer>
</div>
</body>
</html>
