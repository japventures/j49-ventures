<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>J49 Ventures | Family Office</title>
  <meta name="description" content="J49 Ventures is a privately held family office focused on selective investments, strategic partnerships, and long-term ownership.">
  <meta name="robots" content="index,follow">
  <link rel="icon" href="assets/j49-logo.png">
  <style>
    :root {
      --bg: #f5f0e8;
      --ink: #2d2c2a;
      --muted: #79746d;
      --line: #cfc6ba;
      --page-x: clamp(28px, 6vw, 92px);
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      min-height: 100%;
      background: var(--bg);
      color: var(--ink);
    }

    body {
      font-family: Arial, Helvetica, sans-serif;
      overflow-x: hidden;
    }

    .page {
      min-height: 100vh;
      position: relative;
      display: grid;
      grid-template-rows: auto 1fr auto;
      padding: 34px var(--page-x) 28px;
      isolation: isolate;
    }

    .page::after {
      content: "";
      position: absolute;
      width: min(42vw, 620px);
      aspect-ratio: 1;
      right: -13vw;
      top: 50%;
      transform: translateY(-50%) rotate(45deg);
      border: 1px solid rgba(45, 44, 42, 0.10);
      z-index: -1;
    }

    .brand {
      display: inline-block;
      width: clamp(135px, 12vw, 190px);
    }

    .brand img {
      display: block;
      width: 100%;
      height: auto;
      mix-blend-mode: multiply;
    }

    main {
      display: flex;
      align-items: flex-end;
      padding: clamp(70px, 12vh, 150px) 0 clamp(70px, 11vh, 125px);
    }

    .content {
      max-width: 760px;
    }

    .eyebrow {
      margin: 0 0 22px;
      font-size: 12px;
      line-height: 1;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--muted);
    }

    h1 {
      margin: 0;
      max-width: 700px;
      font-size: clamp(54px, 6.3vw, 96px);
      line-height: 0.96;
      font-weight: 400;
      letter-spacing: -0.055em;
    }

    .rule {
      width: 68px;
      height: 1px;
      margin: 34px 0 26px;
      background: var(--line);
    }

    .intro {
      margin: 0;
      max-width: 670px;
      font-size: clamp(17px, 1.45vw, 22px);
      line-height: 1.55;
      color: #5f5b55;
    }

    .contact {
      display: inline-block;
      margin-top: 34px;
      color: var(--ink);
      text-decoration: none;
      font-size: 12px;
      letter-spacing: 0.19em;
      text-transform: uppercase;
      padding-bottom: 7px;
      border-bottom: 1px solid var(--line);
      transition: border-color .2s ease, opacity .2s ease;
    }

    .contact:hover {
      border-color: var(--ink);
      opacity: .72;
    }

    footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 24px;
      color: #8b857d;
      font-size: 11px;
      letter-spacing: 0.13em;
      text-transform: uppercase;
    }

    @media (max-width: 720px) {
      .page {
        padding-top: 24px;
        padding-bottom: 22px;
      }

      .page::after {
        width: 95vw;
        right: -48vw;
        top: 54%;
      }

      .brand {
        width: 122px;
      }

      main {
        align-items: center;
        padding: 70px 0 60px;
      }

      h1 {
        font-size: clamp(48px, 15vw, 70px);
        max-width: 9ch;
      }

      .intro {
        font-size: 17px;
      }

      footer {
        align-items: flex-end;
        font-size: 9px;
      }

      footer span:last-child {
        text-align: right;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <header>
      <a class="brand" href="/" aria-label="J49 Ventures home">
        <img src="assets/j49-logo.png" alt="J49 Ventures Family Office">
      </a>
    </header>

    <main>
      <section class="content" aria-labelledby="main-title">
        <p class="eyebrow">Private Investment Office</p>
        <h1 id="main-title">Building long-term value.</h1>
        <div class="rule" aria-hidden="true"></div>
        <p class="intro">
          J49 Ventures is a privately held family office focused on selective investments,
          strategic partnerships, and long-term ownership.
        </p>
        <a class="contact" href="mailto:contact@j49.mx">contact@j49.mx</a>
      </section>
    </main>

    <footer>
      <span>© 2026 J49 Ventures</span>
      <span>The Woodlands, Texas</span>
    </footer>
  </div>
</body>
</html>
